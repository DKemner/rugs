<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tapijten Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Tapijten Studio</h1>
    <p class="line">
      <span>Thuis is waar het tapijt ligt</span>
      <span class="right">Huren, Kopen en Leasen</span>
    </p>
    <p class="line">
      <span>Gegarandeerd handgeknoopt</span>
      <a href="offerte.html">
        <span class="right">Uw offerte aanvragen</span>
      </a>
    </p>
  </header>
  <main>
    <div class="container">
      <h1>Offerte aanvragen</h1>
    
      <form action="https://formspree.io/f/xdappaqd" method="POST">
        <label>Naam:</label>
        <input type="text" name="naam" required>
    
        <label>Email:</label>
        <input type="email" name="email" required>
    
        <label>Telefoon:</label>
        <input type="tel" name="telefoon">
    
        <label>Type dienst:</label>
        <select name="dienst">
          <option>Huren</option>
          <option>Kopen</option>
          <option>Leasen</option>
        </select>
    
        <label>Beschrijving / wensen:</label>
        <textarea name="bericht" rows="5"></textarea>
    
        <button type="submit">Offerte aanvragen</button>
      </form>
    </div>
  </main>
  
  <footer>
    <div class="footer-content">
      <p>Handgeknoopte tapijten voor huis en bedrijf.</p>
      <p>© 2026 Tapijten Studio. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
